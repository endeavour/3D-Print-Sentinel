[printer.entities]
BinaryIsPrintingSensor = binary_sensor.qidi_q2_printing
PrintingOnState = on
PrinterCameras = camera.qidi_q2_internal_cam, camera.qidi_q2_overhead_cam
PrinterStopButton = button.qidi_q2_cancel_print
PrinterPauseButton = button.qidi_q2_pause_print

[program.timings]
RunModelInterval = 5
PauseTime = 120
TerminationTime = 3600

[model.detection]
Threshold = 0.6
NMS = 0.4

[notifications.config]
NotifyOnWarmup = True
SaveAnnotatedImages = True

[notifications.entities]
ExtruderTempSensor = sensor.qidi_q2_extruder_temperature
ExtruderTargetTempSensor = number.qidi_q2_extruder_target
